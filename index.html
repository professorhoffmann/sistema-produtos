<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sistema de Produtos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Sistema de Produtos</h1>

</header>

<main>

<section>

<h2>Pesquisar Produto</h2>

<input
type="text"
placeholder="Digite o nome">

<button>

Pesquisar

</button>

</section>

<section>

<h2>Cadastrar Produto</h2>

<input
type="text"
placeholder="Produto">

<input
type="number"
placeholder="Quantidade">

<input
type="number"
placeholder="Valor">

<input
type="text"
placeholder="Categoria">

<button>

Salvar Produto

</button>

</section>

<section>

<h2>Produtos</h2>

<div id="lista">

Nenhum produto carregado.

</div>

</section>

</main>

<script src="script.js"></script>

</body>

</html>
